<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HOTS Generator Pro — All Taxonomy & Question Types</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
/* --- CSS MEWAH & STABIL --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0f; --bg2: #141418; --bg3: #1c1c22; --bg4: #24242c; --border: rgba(255,255,255,0.08);
  --text: #f0eff4; --text2: #9998a8; --accent: #7c6af7; --radius: 12px;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
.app-container { display: flex; min-height: 100vh; }
.sidebar { width: 280px; background: var(--bg2); border-right: 1px solid var(--border); padding: 30px 20px; position: fixed; height: 100vh; z-index: 100; }
.main-content { margin-left: 280px; flex: 1; padding: 40px 60px; max-width: 1200px; }

/* Navigation */
.nav-item { cursor: pointer; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; transition: 0.2s; font-weight: 500; }
.nav-item:hover { background: var(--bg3); color: var(--accent); }

/* Screens */
.screen { display: none; animation: fadeIn 0.3s ease-out; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Form Components */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
input, textarea, select { 
    width: 100%; background: var(--bg3); border: 1px solid var(--border); 
    border-radius: 8px; padding: 12px; color: white; margin-top: 8px; outline: none; font-size: 14px;
}
input:focus, textarea:focus, select:focus { border-color: var(--accent); }

/* Bloom Grid C1-C6 */
.bloom-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 12px; }
.bloom-card { 
    background: var(--bg3); border: 1px solid var(--border); padding: 15px 5px; 
    border-radius: 10px; cursor: pointer; text-align: center; transition: 0.2s;
}
.bloom-card:hover { border-color: var(--accent); }
.bloom-card.selected { border-color: var(--accent); background: rgba(124,106,247,0.15); border-width: 2px; }

/* Action Button */
.btn-gen { 
    background: var(--accent); color: white; border: none; padding: 18px; 
    border-radius: var(--radius); width: 100%; font-weight: 600; cursor: pointer;
    font-family: 'Syne', sans-serif; transition: 0.2s; margin-top: 10px; font-size: 16px;
}
.btn-gen:hover { filter: brightness(1.1); transform: translateY(-2px); }
.btn-gen:disabled { opacity: 0.5; cursor: not-allowed; }

/* Loader */
.loading-overlay { 
    display: none; position: fixed; inset: 0; background: rgba(13,13,15,0.95); 
    z-index: 1000; align-items: center; justify-content: center; flex-direction: column;
}
.loading-overlay.show { display: flex; }

/* Result Style */
.soal-item { background: var(--bg3); padding: 25px; border-radius: 12px; margin-bottom: 25px; border-left: 4px solid var(--accent); }
</style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div style="font-family: 'Syne'; font-size: 26px; color: var(--accent);">⚡ Meracik Soal AI...</div>
    <p style="color: var(--text2); margin-top: 10px;">Sedang menyusun soal berdasarkan parameter Bos.</p>
</div>

<div class="app-container">
    <aside class="sidebar">
        <h1 style="font-family: 'Syne'; font-size: 24px; margin-bottom: 40px;">HOTS <span style="color: var(--accent);">PRO</span></h1>
        <div class="nav-item" onclick="showScreen('generate')">✦ Buat Soal</div>
        <div id="nav-hasil" class="nav-item" style="display: none; color: var(--accent);" onclick="showScreen('hasil')">📄 Lihat Hasil</div>
    </aside>

    <main class="main-content">
        <div id="screen-generate" class="screen active">
            <h2 style="font-family: 'Syne'; font-size: 32px; margin-bottom: 30px;">Generator Soal</h2>
            
            <div class="card">
                <label>Mata Pelajaran</label>
                <input type="text" id="mapel" placeholder="Contoh: Sejarah Indonesia">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                    <div>
                        <label>Kelas</label>
                        <select id="kelas">
                            <option value="7">Kelas 7</option><option value="8">Kelas 8</option><option value="9">Kelas 9</option>
                            <option value="10">Kelas 10</option><option value="11">Kelas 11</option><option value="12">Kelas 12</option>
                        </select>
                    </div>
                    <div>
                        <label>Jumlah Soal</label>
                        <input type="number" id="numSoal" value="3" min="1" max="10">
                    </div>
                </div>

                <label style="display: block; margin-top: 20px;">Materi Utama</label>
                <input type="text" id="materi" placeholder="Contoh: Pergerakan Nasional">

                <label style="display: block; margin-top: 20px;">Tujuan Pembelajaran (TP)</label>
                <textarea id="tp" rows="3" placeholder="Contoh: Siswa mampu menganalisis strategi perjuangan organisasi modern"></textarea>
            </div>

            <div class="card">
                <label>Level Kognitif (Taksonomi Bloom)</label>
                <div class="bloom-grid">
                    <div class="bloom-card" id="btn-C1" onclick="pilihLevel('C1')"><strong>C1</strong><br><small>Mengingat</small></div>
                    <div class="bloom-card" id="btn-C2" onclick="pilihLevel('C2')"><strong>C2</strong><br><small>Memahami</small></div>
                    <div class="bloom-card" id="btn-C3" onclick="pilihLevel('C3')"><strong>C3</strong><br><small>Menerapkan</small></div>
                    <div class="bloom-card" id="btn-C4" onclick="pilihLevel('C4')"><strong>C4</strong><br><small>Analisis</small></div>
                    <div class="bloom-card" id="btn-C5" onclick="pilihLevel('C5')"><strong>C5</strong><br><small>Evaluasi</small></div>
                    <div class="bloom-card" id="btn-C6" onclick="pilihLevel('C6')"><strong>C6</strong><br><small>Mencipta</small></div>
                </div>
            </div>

            <div class="card">
                <label>Jenis Soal</label>
                <select id="jenisSoal">
                    <option value="Pilihan Ganda">Pilihan Ganda (PG)</option>
                    <option value="Pilihan Ganda Kompleks (2 jawaban benar)">PG Kompleks (2 Benar)</option>
                    <option value="Pilihan Ganda Kompleks (3 jawaban benar)">PG Kompleks (3 Benar)</option>
                    <option value="Uraian">Uraian</option>
                    <option value="Mengurutkan">Mengurutkan</option>
                    <option value="Menjodohkan">Menjodohkan</option>
                    <option value="Benar Salah">Benar Salah</option>
                </select>
            </div>

            <button class="btn-gen" id="gen-btn" onclick="eksekusiGenerate()">GENERATE SEKARANG</button>
        </div>

        <div id="screen-hasil" class="screen">
            <h2 style="font-family: 'Syne'; font-size: 32px; margin-bottom: 20px;">Daftar Soal</h2>
            <div id="hasil-konten"></div>
            <button class="btn-gen" style="background: var(--bg3);" onclick="showScreen('generate')">BUAT ULANG</button>
        </div>
    </main>
</div>

<script>
let levelTerpilih = "C4"; // Default awal

// Fungsi pilih level kognitif
function pilihLevel(val) {
    levelTerpilih = val;
    document.querySelectorAll('.bloom-card').forEach(card => card.classList.remove('selected'));
    const btn = document.getElementById('btn-' + val);
    if(btn) btn.classList.add('selected');
}

function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    window.scrollTo(0,0);
}

// FUNGSI INTI GENERATE
async function eksekusiGenerate() {
    const mapel = document.getElementById('mapel').value.trim();
    const materi = document.getElementById('materi').value.trim();
    const tp = document.getElementById('tp').value.trim();
    const num = document.getElementById('numSoal').value;
    const jenis = document.getElementById('jenisSoal').value;
    const kelas = document.getElementById('kelas').value;

    if (!mapel || !tp) {
        alert("Waduh Bos, isian Mapel dan TP jangan dikosongin!");
        return;
    }

    const loader = document.getElementById('loader');
    const btn = document.getElementById('gen-btn');
    
    loader.classList.add('show');
    btn.disabled = true;

    // Prompt yang sangat spesifik
    const promptText = `Buatkan ${num} soal ${mapel} untuk Kelas ${kelas}. 
    Materi: ${materi}. TP: ${tp}. 
    Level Kognitif: ${levelTerpilih}. 
    Jenis Soal: ${jenis}. 
    Wajib format JSON murni: {
      "soal": [
        {
          "no": 1, 
          "stimulus": "Teks/kasus pendukung...", 
          "pertanyaan": "...", 
          "opsi": ["A. ...", "B. ...", "C. ...", "D. ...", "E. ..."], 
          "kunci": "..."
        }
      ]
    }`;

    try {
        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: promptText })
        });

        const data = await response.json();
        
        if (!response.ok) throw new Error(data.error || "Gagal menghubungi AI");

        renderHasil(data, jenis);
        showScreen('hasil');
        document.getElementById('nav-hasil').style.display = 'block';

    } catch (err) {
        alert("Error: " + err.message);
    } finally {
        loader.classList.remove('show');
        btn.disabled = false;
    }
}

function renderHasil(data, jenis) {
    const box = document.getElementById('hasil-konten');
    let html = "";
    
    data.soal.forEach(s => {
        html += `
            <div class="soal-item">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <span style="color:var(--accent); font-weight:bold;">SOAL NO ${s.no}</span>
                    <span style="font-size:12px; opacity:0.6;">${jenis} | ${levelTerpilih}</span>
                </div>
                <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:8px; font-style:italic; margin-bottom:15px; border:1px solid var(--border); line-height:1.6;">${s.stimulus}</div>
                <p style="font-weight:500; margin-bottom:15px; line-height:1.4;">${s.pertanyaan}</p>
                <div style="display: grid; gap: 8px;">
                    ${(s.opsi || []).map(o => `<div style="padding:10px; background:var(--bg2); border-radius:6px; font-size:14px; border:1px solid var(--border);">${o}</div>`).join('')}
                </div>
                <div style="margin-top:20px; padding-top:15px; border-top:1px dashed var(--border); color:#3ecf8e; font-weight:bold;">Kunci: ${s.kunci}</div>
            </div>
        `;
    });
    box.innerHTML = html;
}

// Jalankan fungsi pilih level C4 saat halaman dimuat
window.onload = () => {
    pilihLevel('C4');
};
</script>
</body>
</html>
