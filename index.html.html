<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HOTS Generator — Soal Tingkat Tinggi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
/* ── CSS MEWAH ASLI BOS ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0f; --bg2: #141418; --bg3: #1c1c22; --border: rgba(255,255,255,0.08);
  --text: #f0eff4; --text2: #9998a8; --accent: #7c6af7; --radius: 12px;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
.app-container { display: flex; min-height: 100vh; }
.sidebar { width: 280px; background: var(--bg2); border-right: 1px solid var(--border); padding: 30px 20px; position: fixed; height: 100vh; z-index: 10; }
.main-content { margin-left: 280px; flex: 1; padding: 40px 60px; max-width: 1200px; }

/* UI Screens */
.screen { display: none; animation: fadeIn 0.4s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Cards & Inputs */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
input, textarea, select { 
    width: 100%; background: var(--bg3); border: 1px solid var(--border); 
    border-radius: 8px; padding: 12px; color: white; margin-top: 8px; outline: none;
}
.btn-gen { 
    background: var(--accent); color: white; border: none; padding: 18px; 
    border-radius: var(--radius); width: 100%; font-weight: 600; cursor: pointer;
    font-family: 'Syne', sans-serif; transition: 0.3s; margin-top: 10px;
}
.btn-gen:hover { filter: brightness(1.2); }
.btn-gen:disabled { opacity: 0.5; cursor: not-allowed; }

/* Bloom Grid Fixed */
.bloom-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 12px; }
.bloom-card { 
    background: var(--bg3); border: 1px solid var(--border); padding: 20px 10px; 
    border-radius: 10px; cursor: pointer; text-align: center; transition: 0.2s;
}
.bloom-card:hover { border-color: var(--accent); }
.bloom-card.selected { border-color: var(--accent); background: rgba(124,106,247,0.15); box-shadow: 0 0 15px rgba(124,106,247,0.2); }

/* Soal & Loading */
.loading-overlay { 
    display: none; position: fixed; inset: 0; background: rgba(13,13,15,0.95); 
    z-index: 1000; align-items: center; justify-content: center; flex-direction: column;
}
.loading-overlay.show { display: flex; }
.soal-item { background: var(--bg3); padding: 25px; border-radius: 12px; margin-bottom: 25px; border-left: 4px solid var(--accent); }
</style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div style="font-family: 'Syne'; font-size: 26px; color: var(--accent);">⚡ Meracik Soal HOTS...</div>
    <p style="color: var(--text2); margin-top: 10px;">Mohon tunggu sebentar, Bos.</p>
</div>

<div class="app-container">
    <aside class="sidebar">
        <h1 style="font-family: 'Syne'; font-size: 24px; margin-bottom: 40px; color: #fff;">HOTS GEN <span style="color: var(--accent);">v2</span></h1>
        <nav>
            <div style="cursor: pointer; margin-bottom: 20px; font-weight: 500;" onclick="showScreen('generate')">✦ Buat Soal</div>
            <div id="nav-hasil" style="cursor: pointer; display: none; color: var(--text2);" onclick="showScreen('hasil')">📄 Hasil Terakhir</div>
        </nav>
    </aside>

    <main class="main-content">
        <div id="screen-generate" class="screen active">
            <h2 style="font-family: 'Syne'; font-size: 32px; margin-bottom: 10px;">Generator Soal</h2>
            <p style="color: var(--text2); margin-bottom: 30px;">Input parameter untuk hasilkan soal berbasis nalar.</p>
            
            <div class="card">
                <label style="font-size: 14px; color: var(--text2);">Mata Pelajaran</label>
                <input type="text" id="mapel" placeholder="Contoh: Geografi">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                    <div>
                        <label style="font-size: 14px; color: var(--text2);">Kelas</label>
                        <select id="kelas">
                            <option value="10">Kelas 10</option>
                            <option value="11">Kelas 11</option>
                            <option value="12">Kelas 12</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size: 14px; color: var(--text2);">Jumlah Soal</label>
                        <input type="number" id="numSoal" value="3" min="1" max="10">
                    </div>
                </div>

                <label style="display: block; margin-top: 20px; font-size: 14px; color: var(--text2);">Materi Utama</label>
                <input type="text" id="materi" placeholder="Contoh: Mitigasi Bencana">

                <label style="display: block; margin-top: 20px; font-size: 14px; color: var(--text2);">Tujuan Pembelajaran (TP)</label>
                <textarea id="tp" rows="3" placeholder="Contoh: Siswa dapat menganalisis risiko bencana di wilayah pesisir"></textarea>
            </div>

            <div class="card">
                <label style="font-size: 14px; color: var(--text2);">Level Kognitif Bloom (Pilih Satu)</label>
                <div class="bloom-grid">
                    <div class="bloom-card" onclick="setBloom(this, 'C4')"><strong>C4</strong><br><small>Analisis</small></div>
                    <div class="bloom-card" onclick="setBloom(this, 'C5')"><strong>C5</strong><br><small>Evaluasi</small></div>
                    <div class="bloom-card" onclick="setBloom(this, 'C6')"><strong>C6</strong><br><small>Kreasi</small></div>
                </div>
            </div>

            <button class="btn-gen" id="gen-btn" onclick="doGenerate()">GENERATE SEKARANG</button>
        </div>

        <div id="screen-hasil" class="screen">
            <h2 style="font-family: 'Syne'; font-size: 32px; margin-bottom: 20px;">Daftar Soal</h2>
            <div id="hasil-konten"></div>
            <button class="btn-gen" style="background: var(--bg3);" onclick="showScreen('generate')">BUAT ULANG</button>
        </div>
    </main>
</div>

<script>
// --- GLOBAL VARIABLES ---
let selectedBloom = null;

// --- CLICK HANDLERS (FIXED) ---
function setBloom(el, val) {
    // Hapus kelas selected dari semua kartu bloom
    document.querySelectorAll('.bloom-card').forEach(card => card.classList.remove('selected'));
    // Tambahkan ke yang diklik
    el.classList.add('selected');
    selectedBloom = val;
    console.log("Level terpilih:", selectedBloom);
}

function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    window.scrollTo(0,0);
}

// --- MAIN GENERATOR FUNCTION ---
async function doGenerate() {
    const mapel = document.getElementById('mapel').value.trim();
    const materi = document.getElementById('materi').value.trim();
    const tp = document.getElementById('tp').value.trim();
    const num = document.getElementById('numSoal').value;

    // Validasi
    if(!mapel || !selectedBloom || !tp) {
        alert("Waduh Bos, isian Mapel, TP, dan Level Bloom wajib diisi!");
        return;
    }

    const loader = document.getElementById('loader');
    const btn = document.getElementById('gen-btn');
    
    loader.classList.add('show');
    btn.disabled = true;

    // Prompt JSON murni untuk Gemini
    const fullPrompt = `Buatkan ${num} soal HOTS Mapel: ${mapel}, Materi: ${materi}, TP: ${tp}, Level: ${selectedBloom}. 
    Wajib format JSON murni: {"soal": [{"no": 1, "stimulus": "...", "pertanyaan": "...", "opsi": {"A": "...", "B": "...", "C": "...", "D": "...", "E": "..."}, "kunci": "A"}]}`;

    try {
        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: fullPrompt })
        });

        if (!response.ok) throw new Error("Gagal mengambil data dari server");
        
        const data = await response.json();
        renderHasil(data);
        showScreen('hasil');
        document.getElementById('nav-hasil').style.display = 'block';
    } catch (err) {
        alert("Error: " + err.message);
        console.error(err);
    } finally {
        loader.classList.remove('show');
        btn.disabled = false;
    }
}

function renderHasil(data) {
    const box = document.getElementById('hasil-konten');
    let html = "";
    
    if(!data || !data.soal) {
        box.innerHTML = "<p>Data soal tidak valid.</p>";
        return;
    }
    
    data.soal.forEach(s => {
        html += `
            <div class="soal-item">
                <div style="color: var(--accent); font-weight: 600; font-size: 12px; letter-spacing: 1px; margin-bottom: 12px; text-transform: uppercase;">BUTIR SOAL NO ${s.no}</div>
                <div style="background: rgba(255,255,255,0.03); padding: 18px; border-radius: 8px; font-style: italic; margin-bottom: 15px; border: 1px solid var(--border); line-height: 1.6; font-size: 15px;">${s.stimulus}</div>
                <p style="font-weight: 500; margin-bottom: 20px; font-size: 17px; line-height: 1.5;">${s.pertanyaan}</p>
                <div style="display: grid; gap: 10px;">
                    ${Object.entries(s.opsi).map(([k, v]) => `
                        <div style="padding: 12px 15px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; font-size: 14px;">
                            <strong style="color: var(--accent); margin-right: 10px;">${k}.</strong> ${v}
                        </div>
                    `).join('')}
                </div>
                <div style="margin-top: 25px; padding-top: 15px; border-top: 1px dashed var(--border); color: #3ecf8e; font-size: 14px; font-weight: bold;">
                    ✓ KUNCI JAWABAN: ${s.kunci}
                </div>
            </div>
        `;
    });
    box.innerHTML = html;
}
</script>
</body>
</html>
