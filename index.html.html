<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>HOTS Generator</title>
<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
input, textarea { width:100%; padding:10px; margin:5px 0; }
button { padding:10px; background:#7c6af7; color:#fff; border:none; cursor:pointer; }
.soal { background:#222; padding:15px; margin-top:15px; }
</style>
</head>
<body>

<h2>🔥 HOTS Generator</h2>

<input id="mapel" placeholder="Mapel">
<input id="kelas" placeholder="Kelas" value="11">
<input id="materi" placeholder="Materi">
<textarea id="tp" placeholder="Tujuan Pembelajaran"></textarea>

<button onclick="generate()">GENERATE</button>

<div id="hasil"></div>

<script>
async function generate() {
    const mapel = document.getElementById("mapel").value;
    const kelas = document.getElementById("kelas").value;
    const materi = document.getElementById("materi").value;
    const tp = document.getElementById("tp").value;

    if(!mapel || !tp) return alert("Isi dulu!");

    document.getElementById("hasil").innerHTML = "Loading...";

    const prompt = `
WAJIB JSON VALID:

{
 "soal":[
  {
   "no":1,
   "stimulus":"...",
   "pertanyaan":"...",
   "opsi":["A. ...","B. ...","C. ...","D. ...","E. ..."],
   "kunci":"A"
  }
 ]
}

Buat 3 soal HOTS
Mapel: ${mapel}
Kelas: ${kelas}
Materi: ${materi}
TP: ${tp}
`;

    try {
        const res = await fetch("/api/generate", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ prompt })
        });

        const data = await res.json();
        console.log(data);

        let soal = data.soal || [];

        if (!Array.isArray(soal)) soal = [soal];

        let html = "";

        soal.forEach((s,i)=>{
            let opsi = s.opsi || [];

            if (!Array.isArray(opsi)) {
                opsi = Object.entries(opsi).map(([k,v]) => `${k}. ${v}`);
            }

            html += `
            <div class="soal">
                <b>No ${i+1}</b><br><br>
                ${s.stimulus || ""}<br><br>
                ${s.pertanyaan}<br><br>
                ${opsi.map(o=>o+"<br>").join("")}
                <br><b>Jawaban: ${s.kunci}</b>
            </div>
            `;
        });

        document.getElementById("hasil").innerHTML = html;

    } catch(e) {
        document.getElementById("hasil").innerHTML = "ERROR: " + e.message;
    }
}
</script>

</body>
</html>
