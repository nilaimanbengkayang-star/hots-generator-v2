<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>HOTS Generator</title>
<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
input, textarea { width:100%; padding:10px; margin:5px 0; }
button { padding:10px; background:#7c6af7; color:#fff; border:none; cursor:pointer; }
.box { background:#222; padding:15px; margin-top:15px; }
</style>
</head>
<body>

<h2>🔥 HOTS Generator</h2>

<input id="mapel" placeholder="Mapel">
<input id="kelas" value="11">
<input id="materi" placeholder="Materi">
<textarea id="tp" placeholder="Tujuan Pembelajaran"></textarea>

<button onclick="generate()">GENERATE</button>

<div id="hasil"></div>

<script>
async function generate() {
    const hasil = document.getElementById("hasil");

    try {
        hasil.innerHTML = "⏳ Loading...";

        const res = await fetch("/api/generate", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ prompt: "buat 1 soal HOTS JSON" })
        });

        if (!res.ok) {
            throw new Error("API ERROR");
        }

        const data = await res.json();

        let html = "";

        (data.soal || []).forEach((s,i)=>{
            html += `
            <div class="box">
                <b>No ${i+1}</b><br>
                ${s.pertanyaan}<br><br>
                ${s.opsi?.join("<br>") || ""}
                <br><b>Jawaban: ${s.kunci}</b>
            </div>
            `;
        });

        hasil.innerHTML = html;

    } catch(e) {
        hasil.innerHTML = "❌ ERROR: " + e.message;
    }
}
</script>

</body>
</html>
