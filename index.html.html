<script>
let levelAktif = "C4";

function pilihLevel(v) {
    levelAktif = v;
    document.querySelectorAll('.bloom-card').forEach(el => el.classList.remove('selected'));
    const el = document.getElementById(v);
    if (el) el.classList.add('selected');
}

function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const target = document.getElementById('screen-' + name);
    if (target) target.classList.add('active');
}

async function gasKeServer() {
    try {
        console.log("START GENERATE");

        const mapel = document.getElementById('mapel')?.value;
        const materi = document.getElementById('materi')?.value;
        const tp = document.getElementById('tp')?.value;
        const kelas = document.getElementById('kelas')?.value;
        const jumlah = document.getElementById('numSoal')?.value;
        const jenis = document.getElementById('jenisSoal')?.value;

        if (!mapel || !tp) {
            alert("Wajib isi Mapel & TP!");
            return;
        }

        document.getElementById('loader')?.classList.add('show');

        const prompt = `
WAJIB JSON VALID TANPA PENJELASAN

{
 "soal":[
  {
   "no":1,
   "stimulus":"...",
   "pertanyaan":"...",
   "opsi":["A. ...","B. ...","C. ...","D. ...","E. ..."],
   "kunci":"A"
  }
 ]
}

Buat ${jumlah} soal HOTS
Mapel: ${mapel}
Kelas: ${kelas}
Materi: ${materi}
Level: ${levelAktif}
Jenis: ${jenis}
TP: ${tp}
`;

        console.log("KIRIM KE API...");

        const res = await fetch('/api/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ prompt })
        });

        const data = await res.json();
        console.log("RESPONSE:", data);

        let soalList = [];

        if (Array.isArray(data)) {
            soalList = data;
        } else if (data?.soal) {
            soalList = Array.isArray(data.soal) ? data.soal : [data.soal];
        }

        if (!soalList || soalList.length === 0) {
            throw new Error("Data kosong dari AI");
        }

        const container = document.getElementById('hasil-box');
        if (!container) throw new Error("Container tidak ditemukan");

        let html = "";

        soalList.forEach((s, i) => {
            let opsi = s.opsi || [];

            if (!Array.isArray(opsi)) {
                opsi = Object.entries(opsi).map(([k,v]) => `${k}. ${v}`);
            }

            html += `
            <div class="soal-box">
                <div style="color:#7c6af7; font-weight:bold;">NO ${i+1}</div>

                ${s.stimulus ? `<div style="opacity:0.7; font-size:13px; margin:10px 0;">${s.stimulus}</div>` : ""}

                <div style="margin-bottom:15px;">${s.pertanyaan || "-"}</div>

                ${opsi.map(o => `<div style="padding:8px; border:1px solid #333; margin-bottom:5px;">${o}</div>`).join("")}

                <div style="margin-top:10px; color:#3ecf8e;">Kunci: ${s.kunci || "-"}</div>
            </div>
            `;
        });

        container.innerHTML = html;

        document.getElementById('nav-hasil').style.display = 'block';
        showScreen('hasil');

    } catch (err) {
        console.error("ERROR BESAR:", err);

        const container = document.getElementById('hasil-box');
        if (container) {
            container.innerHTML = `
            <div class="soal-box">
                <div style="color:red; font-weight:bold;">ERROR</div>
                <div>${err.message}</div>
                <div style="margin-top:10px;">Buka console (F12) untuk detail</div>
            </div>
            `;
            showScreen('hasil');
        }

    } finally {
        document.getElementById('loader')?.classList.remove('show');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    pilihLevel('C4');
    console.log("APP READY");
});
</script>
