<script>
async function gasKeServer() {
    const hasilBox = document.getElementById("hasil-box");

    try {
        hasilBox.innerHTML = "⏳ Generating...";

        const mapel = document.getElementById("mapel").value;
        const materi = document.getElementById("materi").value;
        const tp = document.getElementById("tp").value;
        const kelas = document.getElementById("kelas").value;
        const jumlah = document.getElementById("numSoal").value;

        if (!mapel || !tp) {
            alert("Isi Mapel & TP dulu!");
            return;
        }

        const prompt = `
WAJIB JSON VALID TANPA PENJELASAN

{
 "soal":[
  {
   "no":1,
   "stimulus":"...",
   "pertanyaan":"...",
   "opsi":["A. ...","B. ...","C. ...","D. ...","E. ..."],
   "kunci":"A"
  }
 ]
}

Buat ${jumlah} soal HOTS
Mapel: ${mapel}
Kelas: ${kelas}
Materi: ${materi}
TP: ${tp}
`;

        const res = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt })
        });

        // 🔥 HANDLE ERROR API
        if (!res.ok) {
            const txt = await res.text();
            throw new Error("API ERROR: " + txt);
        }

        const data = await res.json();
        console.log("DATA:", data);

        let listSoal = [];

        // 🔥 NORMALISASI SUPER AMAN
        if (Array.isArray(data)) {
            listSoal = data;
        } else if (Array.isArray(data.soal)) {
            listSoal = data.soal;
        } else if (data.soal) {
            listSoal = [data.soal];
        }

        // 🔥 FALLBACK JIKA KOSONG
        if (!listSoal.length) {
            throw new Error("AI tidak mengembalikan soal");
        }

        // 🔥 RENDER
        let html = "";

        listSoal.forEach((s, i) => {
            let opsi = s.opsi || [];

            if (!Array.isArray(opsi)) {
                opsi = Object.entries(opsi).map(([k,v]) => `${k}. ${v}`);
            }

            html += `
            <div class="soal-box">
                <div style="color:#7c6af7;font-weight:bold;">NO ${i+1}</div>

                ${s.stimulus ? `<div style="opacity:0.7;font-size:13px;margin:10px 0;">${s.stimulus}</div>` : ""}

                <div style="margin-bottom:10px;">${s.pertanyaan || "-"}</div>

                ${opsi.map(o => `<div style="padding:6px;border:1px solid #333;margin:4px 0;">${o}</div>`).join("")}

                <div style="margin-top:10px;color:#3ecf8e;">
                    Kunci: ${s.kunci || "-"}
                </div>
            </div>
            `;
        });

        hasilBox.innerHTML = html;

        document.getElementById('nav-hasil').style.display = 'block';
        showScreen('hasil');

    } catch (err) {
        console.error(err);

        hasilBox.innerHTML = `
        <div class="soal-box">
            <div style="color:red;font-weight:bold;">❌ ERROR</div>
            <div style="margin-top:10px;">${err.message}</div>
            <div style="margin-top:10px;font-size:12px;">
                Cek console (F12)
            </div>
        </div>
        `;
        showScreen('hasil');
    }
}
</script>
