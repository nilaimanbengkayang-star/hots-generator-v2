<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HOTS Generator — Soal Tingkat Tinggi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
/* CSS Mewah Asli Bos */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0f; --bg2: #141418; --bg3: #1c1c22; --border: rgba(255,255,255,0.08);
  --text: #f0eff4; --text2: #9998a8; --accent: #7c6af7; --radius: 12px;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
.app-container { display: flex; min-height: 100vh; }
.sidebar { width: 280px; background: var(--bg2); border-right: 1px solid var(--border); padding: 30px 20px; position: fixed; height: 100vh; }
.main-content { margin-left: 280px; flex: 1; padding: 40px 60px; }
.screen { display: none; }
.screen.active { display: block; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
input, textarea, select { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: white; margin-top: 8px; outline: none; }
.btn-gen { background: var(--accent); color: white; border: none; padding: 16px; border-radius: var(--radius); width: 100%; font-weight: 600; cursor: pointer; font-family: 'Syne'; transition: 0.3s; }
.btn-gen:disabled { opacity: 0.5; cursor: not-allowed; }
.loading-overlay { display: none; position: fixed; inset: 0; background: rgba(13,13,15,0.9); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
.loading-overlay.show { display: flex; }
.soal-item { background: var(--bg3); padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
.bloom-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
.bloom-card { background: var(--bg3); border: 1px solid var(--border); padding: 15px; border-radius: 10px; cursor: pointer; text-align: center; }
.bloom-card.selected { border-color: var(--accent); background: rgba(124,106,247,0.1); }
</style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div style="font-family: 'Syne'; font-size: 24px; color: var(--accent);">⚡ Sedang Menghasilkan Soal...</div>
</div>

<div class="app-container">
    <aside class="sidebar">
        <h1 style="font-family: 'Syne'; font-size: 22px; margin-bottom: 30px;">HOTS GEN</h1>
        <div style="cursor: pointer; margin-bottom: 15px;" onclick="showScreen('generate')">✦ Buat Soal</div>
        <div id="nav-hasil" style="cursor: pointer; display: none;" onclick="showScreen('hasil')">📄 Lihat Hasil</div>
    </aside>

    <main class="main-content">
        <div id="screen-generate" class="screen active">
            <h2 style="font-family: 'Syne'; margin-bottom: 20px;">Detail Soal</h2>
            <div class="card">
                <label>Mata Pelajaran</label>
                <input type="text" id="mapel" placeholder="Contoh: Fisika">
                <label style="margin-top:15px; display:block;">Materi</label>
                <input type="text" id="materi" placeholder="Hukum Newton">
                <label style="margin-top:15px; display:block;">Tujuan Pembelajaran</label>
                <textarea id="tp" rows="3"></textarea>
            </div>
            <div class="card">
                <label>Level Kognitif</label>
                <div class="bloom-grid">
                    <div class="bloom-card" onclick="setBloom(this, 'C4')">C4</div>
                    <div class="bloom-card" onclick="setBloom(this, 'C5')">C5</div>
                    <div class="bloom-card" onclick="setBloom(this, 'C6')">C6</div>
                </div>
            </div>
            <button class="btn-gen" id="gen-btn" onclick="doGenerate()">GENERATE</button>
        </div>

        <div id="screen-hasil" class="screen">
            <h2 style="font-family: 'Syne'; margin-bottom: 20px;">Hasil Soal</h2>
            <div id="hasil-konten"></div>
            <button class="btn-gen" style="background:var(--bg3); margin-top:20px;" onclick="showScreen('generate')">KEMBALI</button>
        </div>
    </main>
</div>

<script>
let selectedBloom = null;
function setBloom(el, val) {
    document.querySelectorAll('.bloom-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedBloom = val;
}
function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
}

async function doGenerate() {
    const mapel = document.getElementById('mapel').value;
    const tp = document.getElementById('tp').value;
    if(!mapel || !selectedBloom) return alert("Lengkapi data!");

    document.getElementById('loader').classList.add('show');
    
    try {
        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                prompt: `Buat 3 soal HOTS ${mapel} level ${selectedBloom} materi ${document.getElementById('materi').value} dengan TP: ${tp}. Format JSON: {"soal": [{"no": 1, "stimulus": "...", "pertanyaan": "...", "opsi": {"A": "...", "B": "...", "C": "...", "D": "...", "E": "..."}, "kunci": "A"}]}`
            })
        });

        const data = await response.json();
        if(!response.ok) throw new Error(data.error || "Gagal");

        renderHasil(data);
        showScreen('hasil');
        document.getElementById('nav-hasil').style.display = 'block';
    } catch (e) {
        alert("Error: " + e.message);
    } finally {
        document.getElementById('loader').classList.remove('show');
    }
}

function renderHasil(data) {
    const box = document.getElementById('hasil-konten');
    let html = "";
    data.soal.forEach(s => {
        html += `<div class="soal-item">
            <strong>Soal ${s.no}</strong>
            <p style="margin: 10px 0; font-style: italic; color: var(--text2);">${s.stimulus}</p>
            <p style="margin-bottom: 10px;">${s.pertanyaan}</p>
            ${Object.entries(s.opsi).map(([k,v]) => `<div>${k}. ${v}</div>`).join('')}
            <div style="margin-top:10px; color: #3ecf8e;">Kunci: ${s.kunci}</div>
        </div>`;
    });
    box.innerHTML = html;
}
</script>
</body>
</html>
