<script>
async function gasKeServer() {
    const mapel = document.getElementById('mapel').value;
    const materi = document.getElementById('materi').value;
    const tp = document.getElementById('tp').value;
    const kelas = document.getElementById('kelas').value;
    const jumlah = document.getElementById('numSoal').value;
    const jenis = document.getElementById('jenisSoal').value;

    if (!mapel || !tp) return alert("Wajib isi Mapel & TP!");

    document.getElementById('loader').classList.add('show');
    const container = document.getElementById('hasil-box');
    container.innerHTML = "";

    const prompt = `
WAJIB JSON VALID TANPA PENJELASAN

{
 "soal":[
  {
   "no":1,
   "stimulus":"...",
   "pertanyaan":"...",
   "opsi":["A. ...","B. ...","C. ...","D. ...","E. ..."],
   "kunci":"A"
  }
 ]
}

Buat ${jumlah} soal HOTS
Mapel: ${mapel}
Kelas: ${kelas}
Materi: ${materi}
Level: ${levelAktif}
Jenis: ${jenis}
TP: ${tp}
`;

    try {
        const res = await fetch('/api/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ prompt })
        });

        let data = await res.json();
        console.log("RAW:", data);

        // 🔥 NORMALISASI SUPER AMAN
        let soalList = [];

        if (Array.isArray(data)) {
            soalList = data;
        } else if (data?.soal) {
            soalList = Array.isArray(data.soal) ? data.soal : [data.soal];
        }

        // 🔥 FALLBACK JIKA KOSONG
        if (soalList.length === 0) {
            throw new Error("AI tidak kirim soal");
        }

        // 🔥 RENDER
        let html = "";

        soalList.forEach((s, i) => {
            let opsi = s.opsi || [];

            // handle object → array
            if (!Array.isArray(opsi)) {
                opsi = Object.entries(opsi).map(([k,v]) => `${k}. ${v}`);
            }

            html += `
            <div class="soal-box">
                <div style="color:#7c6af7; font-weight:bold;">NO ${i+1}</div>

                ${s.stimulus ? `<div style="opacity:0.7; font-size:13px; margin:10px 0;">${s.stimulus}</div>` : ""}

                <div style="margin-bottom:15px;">${s.pertanyaan}</div>

                ${opsi.map(o => `<div style="padding:8px; border:1px solid #333; margin-bottom:5px;">${o}</div>`).join("")}

                <div style="margin-top:10px; color:#3ecf8e;">Kunci: ${s.kunci}</div>
            </div>
            `;
        });

        container.innerHTML = html;
        document.getElementById('nav-hasil').style.display = 'block';
        showScreen('hasil');

    } catch (err) {
        console.error(err);

        // 🔥 FALLBACK UI (TIDAK ERROR LAGI)
        container.innerHTML = `
        <div class="soal-box">
            <div style="color:red; font-weight:bold;">⚠️ AI ERROR</div>
            <div style="margin-top:10px;">
                AI sedang tidak stabil. Klik generate lagi ya bos 🙏
            </div>
        </div>
        `;
        showScreen('hasil');

    } finally {
        document.getElementById('loader').classList.remove('show');
    }
}
</script>
