<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HOTS Generator Pro v3</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
/* --- CSS MASTER --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0f; --bg2: #141418; --bg3: #1c1c22; --border: rgba(255,255,255,0.08);
  --text: #f0eff4; --text2: #9998a8; --accent: #7c6af7; --radius: 12px;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
.app-container { display: flex; min-height: 100vh; }
.sidebar { width: 280px; background: var(--bg2); border-right: 1px solid var(--border); padding: 30px 20px; position: fixed; height: 100vh; z-index: 100; }
.main-content { margin-left: 280px; flex: 1; padding: 40px 60px; max-width: 1200px; }

/* Navigation */
.nav-item { cursor: pointer; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; transition: 0.2s; }
.nav-item:hover { background: var(--bg3); color: var(--accent); }

/* Screens */
.screen { display: none; }
.screen.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Cards & Inputs */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 8px; }
input, textarea, select { 
    width: 100%; background: var(--bg3); border: 1px solid var(--border); 
    border-radius: 8px; padding: 12px; color: white; outline: none; margin-bottom: 15px;
}

/* Bloom Grid C1-C6 (Pasti Bisa Diklik) */
.bloom-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.bloom-card { 
    background: var(--bg3); border: 1px solid var(--border); padding: 15px 5px; 
    border-radius: 10px; cursor: pointer; text-align: center; transition: 0.2s;
}
.bloom-card.selected { 
    border-color: var(--accent) !important; 
    background: rgba(124,106,247,0.2) !important;
    box-shadow: 0 0 15px rgba(124,106,247,0.2);
}

.btn-gen { 
    background: var(--accent); color: white; border: none; padding: 18px; 
    border-radius: var(--radius); width: 100%; font-weight: 600; cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: 16px;
}
.btn-gen:disabled { opacity: 0.5; }

/* Loader */
.loading-overlay { 
    display: none; position: fixed; inset: 0; background: rgba(13,13,15,0.95); 
    z-index: 1000; align-items: center; justify-content: center; flex-direction: column;
}
.loading-overlay.show { display: flex; }
.soal-box { background: var(--bg3); padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
</style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div style="font-family: 'Syne'; font-size: 24px; color: var(--accent);">⚡ Memproses Soal...</div>
</div>

<div class="app-container">
    <aside class="sidebar">
        <h1 style="font-family: 'Syne'; font-size: 24px; margin-bottom: 30px;">HOTS <span style="color: var(--accent);">V3</span></h1>
        <div class="nav-item" onclick="showScreen('generate')">✦ Buat Soal</div>
        <div id="nav-hasil" class="nav-item" style="display: none; color: var(--accent);" onclick="showScreen('hasil')">📄 Hasil Terakhir</div>
    </aside>

    <main class="main-content">
        <div id="screen-generate" class="screen active">
            <h2 style="font-family: 'Syne'; font-size: 32px; margin-bottom: 25px;">Generator Soal</h2>
            
            <div class="card">
                <label>Mata Pelajaran</label>
                <input type="text" id="mapel" placeholder="Contoh: Geografi">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div><label>Kelas</label><input type="text" id="kelas" value="10"></div>
                    <div><label>Jumlah Soal</label><input type="number" id="numSoal" value="3"></div>
                </div>

                <label>Tujuan Pembelajaran (TP)</label>
                <textarea id="tp" rows="3" placeholder="Contoh: Menganalisis sebaran flora fauna"></textarea>
            </div>

            <div class="card">
                <label>Taksonomi Bloom</label>
                <div class="bloom-grid">
                    <div class="bloom-card" id="C1" onclick="pilihLevel('C1')">C1<br><small>Mengingat</small></div>
                    <div class="bloom-card" id="C2" onclick="pilihLevel('C2')">C2<br><small>Memahami</small></div>
                    <div class="bloom-card" id="C3" onclick="pilihLevel('C3')">C3<br><small>Menerapkan</small></div>
                    <div class="bloom-card" id="C4" onclick="pilihLevel('C4')">C4<br><small>Analisis</small></div>
                    <div class="bloom-card" id="C5" onclick="pilihLevel('C5')">C5<br><small>Evaluasi</small></div>
                    <div class="bloom-card" id="C6" onclick="pilihLevel('C6')">C6<br><small>Mencipta</small></div>
                </div>
            </div>

            <div class="card">
                <label>Jenis Soal</label>
                <select id="jenisSoal">
                    <option value="Pilihan Ganda">Pilihan Ganda (PG)</option>
                    <option value="Pilihan Ganda Kompleks (2 Benar)">PG Kompleks (2 Benar)</option>
                    <option value="Pilihan Ganda Kompleks (3 Benar)">PG Kompleks (3 Benar)</option>
                    <option value="Uraian">Uraian</option>
                    <option value="Mengurutkan">Mengurutkan</option>
                    <option value="Menjodohkan">Menjodohkan</option>
                    <option value="Benar Salah">Benar Salah</option>
                </select>
            </div>

            <button class="btn-gen" id="gen-btn" onclick="gasKeServer()">GENERATE SOAL</button>
        </div>

        <div id="screen-hasil" class="screen">
            <h2 style="font-family: 'Syne'; font-size: 32px; margin-bottom: 20px;">Hasil Soal</h2>
            <div id="hasil-box"></div>
            <button class="btn-gen" style="background:var(--bg3); margin-top: 20px;" onclick="showScreen('generate')">BUAT LAGI</button>
        </div>
    </main>
</div>

<script>
let bloomVal = "C4"; // Default

// FUNGSI KLIK BLOOM (Pasti Jalan)
function pilihLevel(id) {
    bloomVal = id;
    // Hapus class selected dari semua
    document.querySelectorAll('.bloom-card').forEach(c => c.classList.remove('selected'));
    // Tambah ke yang dipilih
    document.getElementById(id).classList.add('selected');
}

function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
}

async function gasKeServer() {
    const mapel = document.getElementById('mapel').value;
    const tp = document.getElementById('tp').value;
    const num = document.getElementById('numSoal').value;
    const jenis = document.getElementById('jenisSoal').value;

    if(!mapel || !tp) return alert("Isi Mapel & TP dulu Bos!");

    document.getElementById('loader').classList.add('show');
    
    const prompt = `Buatkan ${num} soal ${mapel}. Jenis: ${jenis}. Level: ${bloomVal}. TP: ${tp}. Wajib JSON: {"soal": [{"no": 1, "pertanyaan": "...", "opsi": ["A. ...", "B. ..."], "kunci": "..."}]}`;

    try {
        const res = await fetch('/api/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        
        let html = "";
        // Ganti bagian render di dalam fungsi gasKeServer Bos dengan ini:
if (data && data.soal && Array.isArray(data.soal)) {
    let html = "";
    data.soal.forEach(s => {
        html += `<div class="soal-box">
            <b>No ${s.no || '-'}</b> [${jenis}]<br><br>
            ${s.pertanyaan || s.stem || 'Soal tidak terbaca'}<br><br>
            ${s.opsi ? (Array.isArray(s.opsi) ? s.opsi.map(o => `<div>${o}</div>`).join('') : Object.values(s.opsi).map(v => `<div>${v}</div>`).join('')) : ''}
            <div style="color:#3ecf8e; margin-top:10px; font-weight:bold;">Kunci: ${s.kunci || '-'}</div>
        </div>`;
    });
    document.getElementById('hasil-box').innerHTML = html;
    showScreen('hasil');
    document.getElementById('nav-hasil').style.display = 'block';
} else {
    throw new Error("Format data soal tidak dikenali AI");
}
        });
        document.getElementById('hasil-box').innerHTML = html;
        showScreen('hasil');
        document.getElementById('nav-hasil').style.display = 'block';
    } catch(e) {
        alert("Gagal: " + e.message);
    } finally {
        document.getElementById('loader').classList.remove('show');
    }
}

// Set default C4 saat start
window.onload = () => pilihLevel('C4');
</script>
</body>
</html>
