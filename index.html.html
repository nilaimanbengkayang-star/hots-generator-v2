<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HOTS Generator Pro v4 — Final Stable</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
/* --- CSS TETAP MEWAH --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0f; --bg2: #141418; --bg3: #1c1c22; --border: rgba(255,255,255,0.08);
  --text: #f0eff4; --text2: #9998a8; --accent: #7c6af7; --radius: 12px;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
.app-container { display: flex; min-height: 100vh; }
.sidebar { width: 280px; background: var(--bg2); border-right: 1px solid var(--border); padding: 30px 20px; position: fixed; height: 100vh; z-index: 100; }
.main-content { margin-left: 280px; flex: 1; padding: 40px 60px; max-width: 1200px; }

/* Navigation */
.nav-item { cursor: pointer; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; transition: 0.2s; }
.nav-item:hover { background: var(--bg3); color: var(--accent); }

/* Screens Logic */
.screen { display: none; }
.screen.active { display: block !important; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Form & Cards */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
input, textarea, select { 
    width: 100%; background: var(--bg3); border: 1px solid var(--border); 
    border-radius: 8px; padding: 12px; color: white; outline: none; margin-bottom: 15px;
}

/* Bloom Grid */
.bloom-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.bloom-card { 
    background: var(--bg3); border: 1px solid var(--border); padding: 15px 5px; 
    border-radius: 10px; cursor: pointer; text-align: center; transition: 0.2s;
}
.bloom-card.selected { border: 2px solid var(--accent) !important; background: rgba(124,106,247,0.2) !important; }

.btn-gen { 
    background: var(--accent); color: white; border: none; padding: 18px; 
    border-radius: var(--radius); width: 100%; font-weight: 700; cursor: pointer; font-size: 16px;
}

/* Loader */
.loading-overlay { 
    display: none; position: fixed; inset: 0; background: rgba(13,13,15,0.95); 
    z-index: 1000; align-items: center; justify-content: center;
}
.loading-overlay.show { display: flex; }

.soal-box { background: var(--bg3); padding: 25px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
</style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div style="font-family: 'Syne'; font-size: 26px; color: var(--accent);">⚡ Meracik Soal...</div>
</div>

<div class="app-container">
    <aside class="sidebar">
        <h1 style="font-family: 'Syne'; font-size: 24px; margin-bottom: 40px;">HOTS <span style="color: var(--accent);">V4</span></h1>
        <div class="nav-item" onclick="showScreen('generate')">✦ Buat Soal</div>
        <div id="nav-hasil" class="nav-item" style="display: none; color: var(--accent);" onclick="showScreen('hasil')">📄 Lihat Hasil</div>
    </aside>

    <main class="main-content">
        <div id="screen-generate" class="screen active">
            <h2 style="font-family: 'Syne'; font-size: 32px; margin-bottom: 30px;">Generator Soal</h2>
            <div class="card">
                <input type="text" id="mapel" placeholder="Mata Pelajaran">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="text" id="kelas" value="10" placeholder="Kelas">
                    <input type="number" id="numSoal" value="2">
                </div>
                <textarea id="tp" rows="3" placeholder="Tujuan Pembelajaran"></textarea>
            </div>
            <div class="card">
                <div class="bloom-grid">
                    <div class="bloom-card" id="C1" onclick="pilihLevel('C1')">C1</div>
                    <div class="bloom-card" id="C2" onclick="pilihLevel('C2')">C2</div>
                    <div class="bloom-card" id="C3" onclick="pilihLevel('C3')">C3</div>
                    <div class="bloom-card" id="C4" onclick="pilihLevel('C4')">C4</div>
                    <div class="bloom-card" id="C5" onclick="pilihLevel('C5')">C5</div>
                    <div class="bloom-card" id="C6" onclick="pilihLevel('C6')">C6</div>
                </div>
            </div>
            <select id="jenisSoal">
                <option value="Pilihan Ganda">Pilihan Ganda</option>
                <option value="Uraian">Uraian</option>
            </select>
            <button class="btn-gen" onclick="gasKeServer()">GENERATE SEKARANG</button>
        </div>

        <div id="screen-hasil" class="screen">
            <h2 style="font-family: 'Syne'; font-size: 32px; margin-bottom: 25px;">Hasil Soal</h2>
            <div id="hasil-box"></div>
            <button class="btn-gen" style="background:var(--bg3);" onclick="showScreen('generate')">BUAT LAGI</button>
        </div>
    </main>
</div>

<script>
let bloomVal = "C4";

function pilihLevel(v) {
    bloomVal = v;
    document.querySelectorAll('.bloom-card').forEach(el => el.classList.remove('selected'));
    document.getElementById(v).classList.add('selected');
}

function showScreen(name) {
    // Fungsi navigasi yang lebih "galak"
    const screens = document.querySelectorAll('.screen');
    screens.forEach(s => s.classList.remove('active'));
    
    const target = document.getElementById('screen-' + name);
    if(target) {
        target.classList.add('active');
        console.log("Pindah ke screen:", name);
    } else {
        console.error("Screen tidak ditemukan:", name);
    }
}

async function gasKeServer() {
    const mapel = document.getElementById('mapel').value;
    const tp = document.getElementById('tp').value;
    
    if(!mapel || !tp) return alert("Lengkapi data!");

    document.getElementById('loader').classList.add('show');

    try {
        const res = await fetch('/api/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                prompt: `Buatkan ${document.getElementById('numSoal').value} soal ${mapel} level ${bloomVal}. TP: ${tp}. Wajib JSON: {"soal":[{"pertanyaan":"...","opsi":["A","B","C","D"],"kunci":"..."}]}`
            })
        });

        const data = await res.json();
        const box = document.getElementById('hasil-box');
        
        // Cek data soal (bisa .soal atau .questions)
        const list = data.soal || data.questions || [];

        if(list.length > 0) {
            let html = "";
            list.forEach((s, idx) => {
                html += `<div class="soal-box">
                    <b>NO ${idx+1}</b><br><br>
                    ${s.pertanyaan || s.question}<br><br>
                    ${s.opsi ? s.opsi.map(o => `<div>• ${o}</div>`).join('') : ''}
                    <div style="color:cyan; margin-top:10px;">Kunci: ${s.kunci || s.answer}</div>
                </div>`;
            });
            box.innerHTML = html;
            
            // PAKSA PINDAH SCREEN
            setTimeout(() => {
                showScreen('hasil');
                document.getElementById('nav-hasil').style.display = 'block';
            }, 100);

        } else {
            alert("Hasil kosong dari AI, coba lagi Bos.");
        }
    } catch(e) {
        alert("Error: " + e.message);
    } finally {
        document.getElementById('loader').classList.remove('show');
    }
}

document.addEventListener('DOMContentLoaded', () => pilihLevel('C4'));
</script>
</body>
</html>
